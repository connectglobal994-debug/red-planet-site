<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CTA Section</title>

  <style>
    body {
      background: #0f0f0f;
      font-family: Arial, sans-serif;
    }

    .cta-section {
      text-align: center;
      margin-top: 80px;
      padding: 60px 20px;
    }

    .cta-section h2 {
      font-size: 32px;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 15px;
    }

    .cta-section p {
      font-size: 18px;
      color: rgba(255,255,255,0.75);
      max-width: 600px;
      margin: 0 auto 25px;
      line-height: 1.6;
    }

    .cta-btn {
      background: white;
      color: black;
      padding: 12px 28px;
      border-radius: 8px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .cta-btn:hover {
      background: #e6e6e6;
    }
  </style>
</head>

<body>

  <section class="cta-section">
    <h2>Stop relying on effort. Build the machine.</h2>

    <p>
      One funnel. One content engine. One operating system that drives recruiting,
      onboarding, and scaling people around the clock.
    </p>

    <button class="cta-btn">Join The Revolution</button>
  </section>

</body>
</html>
