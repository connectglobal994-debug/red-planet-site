<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Red Planet Navbar</title>

<style>
body {
  margin:0;
  background:#0b1020;
  font-family:Arial, sans-serif;
}

/* NAVBAR */
.navbar {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:40px;
  padding:20px;
}

.logo {
  font-size:24px;
  font-weight:800;
  color:white;
}

.nav-links {
  display:flex;
  gap:24px;
}

.nav-links a {
  color:rgba(255,255,255,0.75);
  text-decoration:none;
  transition:0.2s ease;
}

.nav-links a:hover {
  color:white;
}
</style>
</head>

<body>

<nav class="navbar">
  <div class="logo">Red Planet</div>
  <div class="nav-links">
    <a href="#overview">Overview</a>
    <a href="#form">Apply</a>
    <a href="#cta">Join</a>
  </div>
</nav>

</body>
</html>
