<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Red Planet</title>

<style>
body {
  margin:0;
  font-family:Arial, sans-serif;
  background:#0b0b0f;
  color:white;
  text-align:center;
  padding:60px 20px;
}

.container {
  max-width:700px;
  margin:auto;
  background:#15151d;
  padding:30px;
  border-radius:16px;
  border:1px solid #333;
}

h1 {
  margin-top:0;
}

p {
  color:#cfcfd8;
}

input {
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:8px;
  border:1px solid #333;
  background:#0b0b0f;
  color:white;
}

button {
  margin-top:15px;
  padding:12px;
  width:100%;
  background:white;
  color:black;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

button:hover {
  opacity:0.9;
}
</style>

</head>
<body>

<div class="container">
  <h1>Red Planet</h1>
  <p>Join the system. Build the signal.</p>

  <input placeholder="Full Name">
  <input placeholder="Country">
  <input placeholder="Skill">
  <input placeholder="WhatsApp">

  <button>Join Red Planet Team</button>
</div>

</body>
</html>
